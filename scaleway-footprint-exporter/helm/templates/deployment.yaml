apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaleway-footprint-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    app: scaleway-footprint-exporter
    app.kubernetes.io/name: scaleway-footprint-exporter
    app.kubernetes.io/component: keit-data-source
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: scaleway-footprint-exporter
  template:
    metadata:
      labels:
        app: scaleway-footprint-exporter
      {{- if .Values.scrapeAnnotations.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.service.port | quote }}
        prometheus.io/path: "/metrics"
      {{- end }}
    spec:
      containers:
        - name: exporter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: {{ .Values.service.port }}
          envFrom:
            - secretRef:
                {{- if .Values.secret.existingSecretName }}
                name: {{ .Values.secret.existingSecretName }}
                {{- else }}
                name: scaleway-footprint-credentials
                {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
