apiVersion: v1
kind: Service
metadata:
  name: scaleway-footprint-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    app: scaleway-footprint-exporter
    app.kubernetes.io/name: scaleway-footprint-exporter
spec:
  type: {{ .Values.service.type }}
  selector:
    app: scaleway-footprint-exporter
  ports:
    - name: metrics
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: metrics
